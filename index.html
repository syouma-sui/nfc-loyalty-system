<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC来店ルーレット</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #111, #333);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #222;
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      text-align: center;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    p {
      color: #ccc;
      line-height: 1.6;
    }

    select, button, input {
      width: 100%;
      box-sizing: border-box;
      padding: 15px;
      border-radius: 14px;
      border: none;
      margin-top: 12px;
      font-size: 16px;
    }

    button {
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .sub {
      background: #444;
    }

    .coupon {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: #111;
      border: 1px solid #555;
      text-align: left;
    }

    .big {
      font-size: 30px;
      font-weight: 800;
      text-align: center;
      margin: 18px 0;
    }

    .ok {
      color: #9cffb0;
    }

    .bad {
      color: #ff9c9c;
    }

    .small {
      font-size: 13px;
      color: #aaa;
    }

    .user {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .status {
      font-size: 13px;
      color: #9cffb0;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🎯 NFC来店ルーレット</h1>

    <p>
      NFCタッチで来店記録。<br>
      LINE連携でクーポン管理。
    </p>

    <p class="user" id="userName">LINEログイン確認中...</p>
    <p class="status" id="lineStatus"></p>

    <select id="storeId">
      <option value="honmachi">本町店</option>
      <option value="shinsaibashi">心斎橋店</option>
    </select>

    <button onclick="checkin()">START</button>
    <button class="sub" onclick="loadCoupons()">マイクーポンを見る</button>

    <div id="result"></div>
    <div id="coupons"></div>
  </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbz9fjYbFxVtVxVqrxyRWvYkgqEZQJuc_7ps-VNXXhLMrqNl3rMh1f8pNwHrlaEBGzLtzw/exec";
const LIFF_ID = "2010146801-oMs3Tgbe";

let customerId = localStorage.getItem("customerId") || "";
let lineUserId = "";
let lineDisplayName = "";
let lineAdded = false;

if (!localStorage.getItem("browserId")) {
  localStorage.setItem("browserId", "B-" + crypto.randomUUID());
}

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    lineUserId = profile.userId;
    lineDisplayName = profile.displayName || "LINEユーザー";

    document.getElementById("userName").innerText =
      lineDisplayName + " さん、こんにちは";

    try {
      const friendship = await liff.getFriendship();
      lineAdded = friendship.friendFlag === true;
    } catch (e) {
      lineAdded = false;
    }

    document.getElementById("lineStatus").innerText =
      lineAdded ? "LINE友だち確認済み" : "LINEログイン済み";

    loadCoupons();

  } catch (e) {
    document.getElementById("userName").innerText =
      "LINEで開いてください";

    document.getElementById("lineStatus").innerText =
      "LINE情報を取得できませんでした";

    console.log(e);
  }
}

async function api(payload) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  return await res.json();
}

async function checkin() {
  const result = document.getElementById("result");
  const storeId = document.getElementById("storeId").value;

  if (!lineUserId) {
    alert("LINEログインが必要です。LINEから開いてください。");
    return;
  }

  result.innerHTML = "<p>来店記録中...</p>";

  const data = await api({
    action: "checkin",
    storeId: storeId,
    lineUserId: lineUserId,
    lineDisplayName: lineDisplayName,
    browserId: localStorage.getItem("browserId"),
    lineAdded: lineAdded
  });

  if (!data.ok) {
    result.innerHTML = `<p class="bad">${data.message}</p>`;
    return;
  }

  customerId = data.customerId;
  localStorage.setItem("customerId", customerId);

  result.innerHTML = `
    <div class="coupon">
      <div class="big">🎯 ${data.prize}</div>

      <p class="ok">${data.message}</p>

      <p>お名前：<b>${data.lineDisplayName}</b></p>
      <p>クーポンコード：<b>${data.couponCode}</b></p>
      <p>使用可能：<b>${data.usableDate}</b></p>

      <p>
        ${data.lineAdded
          ? "LINE友だち確認済み：当日使用できます"
          : "次回来店時から使用できます"}
      </p>

      <p class="small">
        ※LINEユーザー情報は店舗管理用に保存されています。
      </p>
    </div>
  `;

  loadCoupons();
}

async function loadCoupons() {
  const box = document.getElementById("coupons");

  if (!lineUserId && !customerId) {
    box.innerHTML = "<p>まだクーポンがありません。</p>";
    return;
  }

  box.innerHTML = "<p>マイクーポン読み込み中...</p>";

  const data = await api({
    action: "myCoupons",
    customerId: customerId,
    lineUserId: lineUserId
  });

  if (!data.ok || data.coupons.length === 0) {
    box.innerHTML = "<p>未使用クーポンはありません。</p>";
    return;
  }

  box.innerHTML = "<h2>マイクーポン</h2>";

  data.coupons.forEach(c => {
    box.innerHTML += `
      <div class="coupon">
        <h3>${c.prize}</h3>

        <p>お名前：<b>${c.lineDisplayName}</b></p>
        <p>コード：<b>${c.couponCode}</b></p>
        <p>使用可能：<b>${formatDate(c.usableDate)}</b></p>
        <p>${c.note}</p>

        <input id="pin-${c.couponCode}" placeholder="店員PINを入力" />

        <button onclick="useCoupon('${c.couponCode}')">
          使用する
        </button>
      </div>
    `;
  });
}

async function useCoupon(code) {
  const pin = document.getElementById("pin-" + code).value;

  const data = await api({
    action: "useCoupon",
    couponCode: code,
    pin: pin,
    storeId: document.getElementById("storeId").value
  });

  alert(data.message);

  if (data.ok) {
    loadCoupons();
  }
}

function formatDate(value) {
  if (!value) return "";

  if (typeof value === "string") {
    if (value.includes("T")) {
      return value.split("T")[0];
    }
    return value;
  }

  return value;
}

initLiff();
</script>
</body>
</html>
