<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>NFC来店ルーレット</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:430px;
  background:#1d1d1d;
  border-radius:28px;
  padding:26px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

h1{
  font-size:34px;
  margin-bottom:10px;
  text-align:center;
}

.desc{
  color:#bbb;
  text-align:center;
  line-height:1.7;
  margin-bottom:30px;
}

.user{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  margin-bottom:10px;
}

.loginok{
  text-align:center;
  color:#7dff9c;
  margin-bottom:25px;
}

select,button,input{
  width:100%;
  border:none;
  border-radius:16px;
  padding:18px;
  font-size:18px;
  margin-top:14px;
}

button{
  background:#00c853;
  color:white;
  font-weight:bold;
}

.sub{
  background:#444;
}

.result{
  margin-top:30px;
}

.coupon{
  margin-top:18px;
  background:#101010;
  border:1px solid #444;
  border-radius:22px;
  padding:20px;
}

.big{
  font-size:34px;
  font-weight:800;
  text-align:center;
  margin:20px 0;
}

.ok{
  color:#7dff9c;
}

.bad{
  color:#ff8f8f;
}

.small{
  font-size:13px;
  color:#aaa;
  margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h1>🎯 NFC来店ルーレット</h1>

<p class="desc">
NFCタッチで来店記録。<br>
LINE連携でクーポン管理。
</p>

<div class="user" id="userName">LINEログイン確認中...</div>

<div class="loginok" id="loginStatus"></div>

<select id="store">
<option value="honmachi">本町店</option>
<option value="namba">難波店</option>
<option value="umeda">梅田店</option>
</select>

<button onclick="startRoulette()">START</button>

<button class="sub" onclick="loadCoupons()">
マイクーポンを見る
</button>

<div class="result" id="result"></div>

<div class="result" id="couponList"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyyM-mrcMP30BpdTpG9judBsTa8NrdO49pL4Igx0D2MUh5vtE8G94MppS-jL9c_8syp5g/exec";

const LIFF_ID = "2010146801-oMs3Tgbe";

let lineUserId = "";
let lineDisplayName = "";
let linePicture = "";
let customerId = "";

async function initLiff(){

  await liff.init({
    liffId: LIFF_ID
  });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  lineUserId = profile.userId;
  lineDisplayName = profile.displayName;
  linePicture = profile.pictureUrl;

  document.getElementById("userName").innerText =
    `${lineDisplayName} さん、こんにちは`;

  document.getElementById("loginStatus").innerText =
    "LINEログイン済み";

}

initLiff();

async function api(body){

  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(body)
  });

  return await res.json();

}

async function startRoulette(){

  const result = document.getElementById("result");

  const storeId =
    document.getElementById("store").value;

  if(!lineUserId){

    alert("LINEログインが必要です");
    return;

  }

  result.innerHTML = "<p>来店記録中...</p>";

  const data = await api({

    action:"checkin",

    storeId:storeId,

    lineUserId:lineUserId,

    lineDisplayName:lineDisplayName,

    pictureUrl:linePicture

  });

  if(!data.success){

    result.innerHTML =
      `<p class="bad">${data.message}</p>`;

    return;

  }

  customerId = data.customerId;

  localStorage.setItem("customerId",customerId);

  result.innerHTML = `

    <div class="coupon">

      <div class="big">
        🎯 ${data.prize}
      </div>

      <p class="ok">${data.message}</p>

      <p style="margin-top:20px;">
        お名前：
        <b>${lineDisplayName}</b>
      </p>

      <p style="margin-top:10px;">
        クーポンコード：
        <b>${data.couponCode}</b>
      </p>

      <p style="margin-top:10px;">
        使用可能：
        <b>${data.usableDate}</b>
      </p>

      <p style="margin-top:18px;">
        ${
          data.lineAdded
          ? "LINE友だち確認済み・当日使用OK"
          : "次回来店時から使用できます"
        }
      </p>

      <p class="small">
        LINEユーザー情報は店舗管理用に保存されています。
      </p>

    </div>

  `;

  loadCoupons();

}

async function loadCoupons(){

  const box =
    document.getElementById("couponList");

  const customerId =
    localStorage.getItem("customerId");

  if(!customerId){

    box.innerHTML = "";
    return;

  }

  const data = await api({

    action:"getCoupons",
    customerId:customerId

  });

  if(!data.success){

    box.innerHTML = "";
    return;

  }

  box.innerHTML = "<h2>マイクーポン</h2>";

  data.coupons.forEach(c=>{

    box.innerHTML += `

      <div class="coupon">

        <h3>${c.prize}</h3>

        <p style="margin-top:18px;">
          お名前：
          <b>${c.lineDisplayName}</b>
        </p>

        <p style="margin-top:10px;">
          コード：
          <b>${c.couponCode}</b>
        </p>

        <p style="margin-top:10px;">
          使用可能：
          <b>${c.usableDate}</b>
        </p>

        <p style="margin-top:14px;">
          ${c.note}
        </p>

        <input
          id="pin_${c.couponCode}"
          placeholder="店員PINを入力"
        />

        <button
          onclick="useCoupon('${c.couponCode}')"
        >
          使用する
        </button>

      </div>

    `;

  });

}

async function useCoupon(code){

  const pin =
    document.getElementById(`pin_${code}`).value;

  const res = await api({

    action:"useCoupon",
    couponCode:code,
    pin:pin

  });

  alert(res.message);

  loadCoupons();

}

</script>

</body>
</html>
