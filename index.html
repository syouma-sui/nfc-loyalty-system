<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NFC来店ルーレット</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      width: 86%;
      max-width: 430px;
      background: #1f1f1f;
      border-radius: 28px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }
    h1 {
      font-size: 34px;
      line-height: 1.35;
      margin-bottom: 20px;
    }
    .sub {
      color: #bdbdbd;
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 30px;
    }
    select, button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 20px;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    select {
      background: #f1f1f1;
      color: #111;
    }
    .start {
      background: #06c755;
      color: white;
    }
    .start:disabled {
      background: #555;
      color: #bbb;
    }
    .line {
      background: #06c755;
      color: white;
      display: none;
    }
    #result {
      margin-top: 24px;
      font-size: 20px;
      color: #ff9aa8;
      line-height: 1.7;
      white-space: pre-line;
      min-height: 32px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🎯 NFC来店ルーレット</h1>

    <div class="sub">
      NFCタッチで本日使えるクーポンを発行。<br>
      公式LINE追加でクーポンを保存できます。
    </div>

    <select id="storeSelect">
      <option value="honmachi">本町店</option>
      <option value="namba">難波店</option>
      <option value="umeda">梅田店</option>
    </select>

    <button id="startButton" class="start" onclick="startRoulette()" disabled>
      準備中...
    </button>

    <button id="lineButton" class="line" onclick="openOfficialLine()">
      公式LINEを追加してクーポンを保存
    </button>

    <div id="result"></div>
  </div>

  <script>
    const LIFF_ID = "2010146801-oMs3Tgbe";

    const API_URL =
      "https://script.google.com/macros/s/AKfycbzo-rZoKtY0XCWizPW8hjwQvqSQz8P_0TyNKt5LUAeKtgRQHfdwQXjktuwfWmFq7XSN5w/exec";

    const LINE_OFFICIAL_URL =
      "https://lin.ee/y7wCQnH";

    let lineUserId = "";
    let lineDisplayName = "";

    const resultEl = document.getElementById("result");
    const storeSelect = document.getElementById("storeSelect");
    const lineButton = document.getElementById("lineButton");
    const startButton = document.getElementById("startButton");

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        lineUserId = profile.userId;
        lineDisplayName = profile.displayName || "";

        startButton.disabled = false;
        startButton.innerText = "START";
        resultEl.innerText = "";

      } catch (error) {
        startButton.disabled = true;
        startButton.innerText = "読み込みエラー";
        resultEl.innerText = "LINEアプリから開き直してください";
        console.error(error);
      }
    }

    async function startRoulette() {
      if (!lineUserId) {
        resultEl.innerText = "準備中です。数秒後にもう一度お試しください。";
        return;
      }

      startButton.disabled = true;
      resultEl.innerText = "ルーレット中...";
      lineButton.style.display = "none";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            storeId: storeSelect.value,
            lineUserId: lineUserId,
            lineDisplayName: lineDisplayName
          })
        });

        const data = await res.json();

        if (data.ok) {
          if (data.lineResult === "LINE送信成功") {
            resultEl.innerText =
              `🎉 ${data.couponName}\n\nLINEにクーポンを送信しました。\nトーク画面で提示してください。`;
          } else {
            resultEl.innerText =
              `🎉 ${data.couponName}\n\n本日利用できます。\n公式LINEを追加すると、このクーポンがLINEに届きます。`;

            lineButton.style.display = "block";
          }
        } else {
          resultEl.innerText = "エラーが発生しました";
        }

      } catch (error) {
        resultEl.innerText = "通信エラーが発生しました";
        console.error(error);
      } finally {
        startButton.disabled = false;
        startButton.innerText = "START";
      }
    }

    function openOfficialLine() {
      window.location.href = LINE_OFFICIAL_URL;
    }

    main();
  </script>
</body>
</html>
