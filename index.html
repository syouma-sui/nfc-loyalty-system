<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NFC来店ルーレット</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 86%;
      max-width: 430px;
      background: #1f1f1f;
      border-radius: 28px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    h1 {
      font-size: 34px;
      line-height: 1.35;
      margin-bottom: 20px;
    }

    .sub {
      color: #bdbdbd;
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    #userName {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.5;
    }

    #loginStatus {
      color: #5ef28b;
      font-size: 20px;
      margin: 14px 0 30px;
    }

    select,
    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 20px;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    select {
      background: #f1f1f1;
      color: #111;
    }

    .start {
      background: #06c755;
      color: white;
    }

    .line {
      background: #06c755;
      color: white;
      display: none;
    }

    .subButton {
      background: #444;
      color: white;
    }

    #result {
      margin-top: 24px;
      font-size: 20px;
      color: #ff9aa8;
      line-height: 1.7;
      white-space: pre-line;
      min-height: 32px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🎯 NFC来店ルーレット</h1>

    <div class="sub">
      NFCタッチで来店記録。<br>
      LINE追加で本日使えるクーポンを受け取れます。
    </div>

    <div id="userName">LINEログイン確認中...</div>
    <div id="loginStatus"></div>

    <select id="storeSelect">
      <option value="honmachi">本町店</option>
      <option value="namba">難波店</option>
      <option value="umeda">梅田店</option>
    </select>

    <button class="start" onclick="startRoulette()">START</button>

    <button id="lineButton" class="line" onclick="openOfficialLine()">
      公式LINEを追加する
    </button>

    <button id="sendButton" class="line" onclick="sendCouponToLine()">
      追加後、LINEにクーポンを送る
    </button>

    <button class="subButton" onclick="reloadPage()">
      再読み込み
    </button>

    <div id="result"></div>
  </div>

  <script>
    const LIFF_ID = "2010146801-oMs3Tgbe";

    const API_URL =
      "https://script.google.com/macros/s/AKfycbyx6PMXZA1mnq-yRx2CRvKWvV4X5JA60kPLKp0aR7sPLWWySSHnIwQABjGTEQslo80uDQ/exec";

    const LINE_OFFICIAL_URL =
      "https://lin.ee/y7wCQnH";

    let lineUserId = "";
    let lineDisplayName = "";
    let isFriend = false;
    let latestCouponName = "";

    const userNameEl = document.getElementById("userName");
    const loginStatusEl = document.getElementById("loginStatus");
    const resultEl = document.getElementById("result");
    const storeSelect = document.getElementById("storeSelect");
    const lineButton = document.getElementById("lineButton");
    const sendButton = document.getElementById("sendButton");

    async function main() {
      try {
        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        lineUserId = profile.userId;
        lineDisplayName = profile.displayName;

        try {
          const friendship = await liff.getFriendship();
          isFriend = friendship.friendFlag;
        } catch (e) {
          isFriend = false;
        }

        userNameEl.innerText =
          `${lineDisplayName} さん、こんにちは`;

        loginStatusEl.innerText =
          isFriend ? "公式LINE追加済み" : "LINEログイン済み";

      } catch (error) {
        userNameEl.innerText = "LINEログインエラー";
        loginStatusEl.innerText = "";
        resultEl.innerText = "LINEアプリから開いてください";
        console.error(error);
      }
    }

    async function startRoulette() {
      if (!lineUserId) {
        alert("LINEログインが必要です");
        return;
      }

      resultEl.innerText = "ルーレット中...";
      lineButton.style.display = "none";
      sendButton.style.display = "none";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            storeId: storeSelect.value,
            lineUserId: lineUserId,
            lineDisplayName: lineDisplayName,
            isFriend: isFriend
          })
        });

        const data = await res.json();

        latestCouponName = data.couponName || "";

        if (data.ok) {
          if (data.lineResult === "LINE送信成功") {
            resultEl.innerText =
              `🎉 ${data.couponName}\n\nLINEにクーポンを送信しました。\nトーク画面で提示してください。`;
          } else {
            resultEl.innerText =
              `🎉 ${data.couponName}\n\n本日利用できます。\n公式LINEを追加すると、このクーポンをLINEに保存できます。`;

            lineButton.style.display = "block";
            sendButton.style.display = "block";
          }
        } else {
          resultEl.innerText =
            data.message || "エラーが発生しました";
        }

      } catch (error) {
        resultEl.innerText = "通信エラーが発生しました";
        console.error(error);
      }
    }

    function openOfficialLine() {
      window.location.href = LINE_OFFICIAL_URL;
    }

    async function sendCouponToLine() {
      if (!lineUserId || !latestCouponName) {
        alert("先にルーレットを回してください");
        return;
      }

      resultEl.innerText = "LINEにクーポン送信中...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            storeId: storeSelect.value,
            lineUserId: lineUserId,
            lineDisplayName: lineDisplayName,
            isFriend: true
          })
        });

        const data = await res.json();

        if (data.lineResult === "LINE送信成功") {
          resultEl.innerText =
            `🎉 ${data.couponName}\n\nLINEに送信しました。\nトーク画面で提示してください。`;
        } else {
          resultEl.innerText =
            "まだ公式LINE追加が確認できません。\n追加後に再読み込みして、もう一度お試しください。";
        }

      } catch (error) {
        resultEl.innerText = "送信エラーが発生しました";
        console.error(error);
      }
    }

    function reloadPage() {
      window.location.reload();
    }

    main();
  </script>
</body>
</html>
