<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC来店ルーレット</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #111, #333);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #222;
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      text-align: center;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    p {
      color: #ccc;
      line-height: 1.6;
    }

    select, input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 15px;
      border-radius: 14px;
      border: none;
      margin-top: 12px;
      font-size: 16px;
    }

    button {
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .sub {
      background: #444;
    }

    .coupon {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: #111;
      border: 1px solid #555;
      text-align: left;
    }

    .big {
      font-size: 30px;
      font-weight: 800;
      text-align: center;
      margin: 18px 0;
    }

    .ok { color: #9cffb0; }
    .bad { color: #ff9c9c; }
  </style>
</head>

<body>
  <div class="card">
    <h1>🎯 NFC来店ルーレット</h1>
    <p>NFCタッチで来店記録。<br>ルーレットでクーポン発行。</p>

    <select id="storeId">
      <option value="honmachi">本町店</option>
      <option value="shinsaibashi">心斎橋店</option>
    </select>

    <input id="name" placeholder="名前を入力" />

    <button onclick="checkin()">START</button>
    <button class="sub" onclick="loadCoupons()">マイクーポンを見る</button>

    <div id="result"></div>
    <div id="coupons"></div>
  </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbz9fjYbFxVtVxVqrxyRWvYkgqEZQJuc_7ps-VNXXhLMrqNl3rMh1f8pNwHrlaEBGzLtzw/exec";

let customerId = localStorage.getItem("customerId") || "";

if (!localStorage.getItem("browserId")) {
  localStorage.setItem("browserId", "B-" + crypto.randomUUID());
}

async function api(payload) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  return await res.json();
}

async function checkin() {
  const result = document.getElementById("result");

  const name = document.getElementById("name").value;
  const storeId = document.getElementById("storeId").value;

  if (!name) {
    alert("名前を入力してください");
    return;
  }

  result.innerHTML = "<p>来店記録中...</p>";

  const data = await api({
    action: "checkin",
    storeId,
    name,
    browserId: localStorage.getItem("browserId"),
    lineUserId: "",
    lineAdded: false
  });

  if (!data.ok) {
    result.innerHTML = `<p class="bad">${data.message}</p>`;

    if (data.customerId) {
      customerId = data.customerId;
      localStorage.setItem("customerId", customerId);
    }

    return;
  }

  customerId = data.customerId;
  localStorage.setItem("customerId", customerId);

  result.innerHTML = `
    <div class="coupon">
      <div class="big">🎯 ${data.prize}</div>
      <p class="ok">クーポンを発行しました</p>
      <p>顧客ID：<b>${data.customerId}</b></p>
      <p>クーポンコード：<b>${data.couponCode}</b></p>
      <p>使用可能日：${data.usableDate}</p>
      <p>${data.lineAdded ? "LINE追加済み：当日使用可" : "次回来店から使用可"}</p>
    </div>
  `;

  loadCoupons();
}

async function loadCoupons() {
  const box = document.getElementById("coupons");

  if (!customerId) {
    box.innerHTML = "<p>まだクーポンがありません。</p>";
    return;
  }

  box.innerHTML = "<p>マイクーポン読み込み中...</p>";

  const data = await api({
    action: "myCoupons",
    customerId
  });

  if (!data.ok || data.coupons.length === 0) {
    box.innerHTML = "<p>未使用クーポンはありません。</p>";
    return;
  }

  box.innerHTML = "<h2>マイクーポン</h2>";

  data.coupons.forEach(c => {
    box.innerHTML += `
      <div class="coupon">
        <h3>${c.prize}</h3>
        <p>コード：<b>${c.couponCode}</b></p>
        <p>使用可能日：${c.usableDate}</p>
        <p>${c.note}</p>

        <input id="pin-${c.couponCode}" placeholder="店員PINを入力" />
        <button onclick="useCoupon('${c.couponCode}')">使用する</button>
      </div>
    `;
  });
}

async function useCoupon(code) {
  const pin = document.getElementById("pin-" + code).value;

  const data = await api({
    action: "useCoupon",
    couponCode: code,
    pin,
    storeId: document.getElementById("storeId").value
  });

  alert(data.message);

  if (data.ok) {
    loadCoupons();
  }
}
</script>

</body>
</html>
