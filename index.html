<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NFC来店ルーレット</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 86%;
      max-width: 430px;
      background: #1f1f1f;
      border-radius: 28px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    h1 {
      font-size: 34px;
      line-height: 1.35;
      margin-bottom: 22px;
    }

    .sub {
      color: #bdbdbd;
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    #userName {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    #loginStatus {
      color: #5ef28b;
      font-size: 20px;
      margin-bottom: 34px;
    }

    select,
    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 20px;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    select {
      background: #f1f1f1;
      color: #111;
    }

    .start {
      background: #06c755;
      color: white;
    }

    .coupon {
      background: #444;
      color: white;
    }

    #result {
      margin-top: 28px;
      font-size: 20px;
      color: #ff9aa8;
      line-height: 1.6;
      min-height: 32px;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>🎯 NFC来店ルーレット</h1>

    <div class="sub">
      NFCタッチで来店記録。<br>
      LINE連携でクーポン管理。
    </div>

    <div id="userName">
      LINEログイン確認中...
    </div>

    <div id="loginStatus"></div>

    <select id="storeSelect">
      <option value="honmachi">本町店</option>
      <option value="namba">難波店</option>
      <option value="umeda">梅田店</option>
    </select>

    <button class="start" onclick="startRoulette()">
      START
    </button>

    <button class="coupon" onclick="goOfficialLine()">
      マイクーポンを見る
    </button>

    <div id="result"></div>

  </div>

  <script>

    const LIFF_ID = "2010146801-oMs3Tgbe";

    const API_URL =
      "https://script.google.com/macros/s/AKfycbzRQROXqwTQhZaKJT8a0CCbnxwrH4WnPVV-C7KGeU9VbqeQz9n_9LLpDueyG9EjLKApYA/exec";

    const LINE_OFFICIAL_URL =
      "https://lin.ee/wPuyUo0";

    let lineUserId = "";
    let lineDisplayName = "";

    const userNameEl =
      document.getElementById("userName");

    const loginStatusEl =
      document.getElementById("loginStatus");

    const resultEl =
      document.getElementById("result");

    const storeSelect =
      document.getElementById("storeSelect");

    async function main() {

      try {

        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile =
          await liff.getProfile();

        lineUserId =
          profile.userId;

        lineDisplayName =
          profile.displayName;

        userNameEl.innerText =
          `${lineDisplayName} さん、こんにちは`;

        loginStatusEl.innerText =
          "LINEログイン済み";

      } catch (error) {

        userNameEl.innerText =
          "LINEログインエラー";

        resultEl.innerText =
          "LINEアプリから開いてください";

        console.error(error);
      }
    }

    async function startRoulette() {

      if (!lineUserId) {
        alert("LINEログインが必要です");
        return;
      }

      resultEl.innerText =
        "ルーレット中...";

      try {

        const res = await fetch(API_URL, {
          method: "POST",

          body: JSON.stringify({
            storeId: storeSelect.value,
            lineUserId: lineUserId,
            lineDisplayName: lineDisplayName
          })
        });

        const data =
          await res.json();

        if (data.ok) {

          resultEl.innerText =
            `🎉 ${data.couponName} を発行しました`;

          setTimeout(() => {

            window.location.href =
              LINE_OFFICIAL_URL;

          }, 1500);

        } else {

          resultEl.innerText =
            data.message ||
            "今日はすでに参加済みです";
        }

      } catch (error) {

        resultEl.innerText =
          "通信エラーが発生しました";

        console.error(error);
      }
    }

    function goOfficialLine() {

      window.location.href =
        LINE_OFFICIAL_URL;
    }

    main();

  </script>

</body>
</html>
